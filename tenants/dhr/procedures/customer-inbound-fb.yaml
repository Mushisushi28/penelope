schema_version: 1
procedure_id: customer-inbound-fb
description: >
  Handle incoming Facebook Messenger DMs for Dobson Headlight Restoration.
  Qualify vehicle and condition, compute quote, offer Calendly booking link,
  escalate to owner on price objection or complaint. One question at a time.
  Voice: lowercase, casual, 1-2 sentences, no formal openers.
owner_team: dhr
specialist_class: customer-frontend
trigger:
  kind: inbound_message
  channel: fb-page

inputs:
  required:
    - thread_id
    - inbound_message_text
    - inbound_message_ts
  optional:
    - customer_state_snapshot
    - customer_name

runtime_budget:
  max_tokens_per_run: 8000
  max_usd_per_run: 0.25
  max_runs_per_thread_per_day: 8

brand_voice:
  tone: "lowercase, conversational, 1-2 sentences"
  mobile_differentiator: "we come to you"
  forbidden_phrases:
    - "I'd be happy to"
    - "Of course!"
    - "Absolutely!"
    - "Great question!"
    - "No problem!"
    - "Hi, I'm"
    - "Hello!"
    - "My name is"
  emoji_policy: match-customer
  rule: "never ask multiple questions in one message. never mention you are a bot or AI. never mention Isaac by name."

states:
  - id: new_inbound
    label: First contact — unknown customer
    when:
      - customer_state.is_none
    actions:
      - kind: ask_question
        # If they mentioned vehicle, ask condition. If they mentioned location, ask vehicle. Default: ask vehicle.
        question: "hey! what kind of vehicle do you have?"
        question_variants:
          - "hey -- what do you drive?"
          - "hey! what kind of vehicle is it?"
        store_as: vehicle_info
        approval: auto
      - kind: mark_job_status
        status: qualifying
      - kind: log_audit
        event: new_customer_contact
        detail: "first DM from customer"
    next: awaiting_vehicle_info
    approval: auto

  - id: returning_customer
    label: Returning customer — already in state
    when:
      - customer_state.vehicle_info
      - customer_state.job_status.is_none
    actions:
      - kind: send_message
        template: "hey, welcome back! ready to book another restoration for your {{customer_state.vehicle_info}}?"
        approval: auto
    next: awaiting_vehicle_info
    approval: auto

  - id: awaiting_vehicle_info
    label: Have vehicle, need condition
    when:
      - customer_state.vehicle_info
      - customer_state.condition.is_none
    actions:
      - kind: ask_question
        question: "are they pretty hazy or just starting to yellow?"
        store_as: condition
        approval: auto
    next: awaiting_condition
    approval: auto

  - id: awaiting_condition
    label: Have vehicle + condition — compute quote
    when:
      - customer_state.vehicle_info
      - customer_state.condition
      - customer_state.quote_amount.is_none
    actions:
      - kind: compute_quote
        pricing_rule_id: standard
        store_as: quote_amount
        out_of_band_approval: owner_telegram_confirm
      - kind: send_message
        # Example: "for your f150 with hazy lights you are looking at $130-$150 for the pair, standard finish with a 1 year warranty. we come to you in lethbridge."
        template: "for your {{customer_state.vehicle_info}} with {{customer_state.condition}} lights you are looking at ${{quote_amount}} for the pair, standard finish with a 1 year warranty. we come to you in {{tenant.address.service_area | split: ' and ' | first}}."
        approval: auto
      - kind: ask_question
        question: "want to lock in a time?"
        store_as: intent_to_book
        approval: auto
      - kind: mark_job_status
        status: quoted
      - kind: log_audit
        event: quote_sent
        detail: "quote_amount={{quote_amount}}"
    next: quoted_pending_booking

  - id: ceramic_inquiry
    label: Customer asked about ceramic / long-term option
    when:
      - customer_state.intent_ceramic
    actions:
      - kind: compute_quote
        pricing_rule_id: ceramic
        store_as: ceramic_quote_amount
        out_of_band_approval: owner_telegram_confirm
      - kind: send_message
        template: "the ceramic coat runs ${{ceramic_quote_amount}} — lasts 3 years vs 1 year standard. still done at your place."
        approval: auto
      - kind: ask_question
        question: "want to go ceramic or stick with standard?"
        store_as: pricing_decision
        approval: auto
      - kind: mark_job_status
        status: quoted
    next: quoted_pending_booking

  - id: quoted_pending_booking
    label: Quote sent, offer Calendly booking link
    when:
      - customer_state.intent_to_book
    actions:
      - kind: offer_booking_link
        provider: calendly
        message_template: "here is the booking link: {{tenant.booking.url_placeholder}} -- {{tenant.booking.available_slots}}"
        approval: auto
      - kind: mark_job_status
        status: booked
      - kind: log_audit
        event: booking_link_sent
    next: booked

  - id: booked
    label: Booking confirmed
    when:
      - customer_state.job_status.is_booked
    actions:
      - kind: send_message
        template: "awesome -- just to confirm: {{customer_state.vehicle_info}}, {{customer_state.location | default: 'your place'}}, {{customer_state.appointment_time}}. i'll reach out the day before to confirm."
        approval: auto
      - kind: schedule_followup
        delay: P1D
        action: appointment_reminder
    next: post_job

  - id: price_objection
    label: Customer objects to price — escalate to owner
    when:
      - customer_state.price_objection
    actions:
      - kind: escalate
        reason: "customer objecting to quoted price — owner review needed"
        to: owner_telegram_confirm
      - kind: log_audit
        event: price_objection_escalated

  - id: out_of_scope
    label: Customer asks about service not offered (e.g. full replacement)
    when:
      - customer_state.out_of_scope_request
    actions:
      - kind: send_message
        template: "we do restoration and polishing, not full replacements. but if the lens is just hazy we can make it look new."
        approval: auto

  - id: post_job
    label: Job complete — emit event, schedule review ask
    when:
      - customer_state.job_status.is_complete
    actions:
      - kind: emit_bus_event
        event: job_complete
        payload:
          tenant_id: dhr
          thread_id: "{{thread_id}}"
          vehicle_info: "{{customer_state.vehicle_info}}"
      - kind: log_audit
        event: job_complete
    next: closed

  - id: closed
    label: Thread closed
    when:
      - customer_state.job_status.is_closed
    actions:
      - kind: log_audit
        event: thread_closed

outputs:
  - quote_amount
  - booking_confirmed
  - vehicle_info
  - condition
