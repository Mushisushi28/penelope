schema_version: 1
procedure_id: payment-reconciler
description: >
  Poll Square for completed DHR payments, match to open job threads by
  reference_id, mark job paid in state, and trigger the review-ask sequence
  (1h delay). DHR uses Square, not Stripe. Runs on cron schedule and on
  bus event payment_received.
owner_team: dhr
specialist_class: payment-watcher
trigger:
  kind: payment_received
  processor: square

inputs:
  required:
    - payment_id
    - amount_cents
    - currency
  optional:
    - customer_ref
    - note

runtime_budget:
  max_tokens_per_run: 1000
  max_usd_per_run: 0.02
  max_runs_per_thread_per_day: 50

square_config:
  credential_env: DHR_SQUARE_ACCESS_TOKEN
  location_id_env: DHR_SQUARE_LOCATION_ID
  # Square /v2/payments polling — reference_id on each payment maps to thread_id
  poll_endpoint: /v2/payments
  reference_id_field: reference_id

states:
  - id: match_payment_to_job
    label: Look up Square payment and match to an open job thread
    actions:
      - kind: lookup_external
        provider: square
        query: "payment/{{payment_id}}"
        store_as: payment_details
      - kind: set_state
        key: matched_thread_id
        value: "{{payment_details.reference_id}}"
      - kind: log_audit
        event: payment_received
        detail: "payment_id={{payment_id}} amount_cents={{amount_cents}} currency={{currency}}"
    next: check_match

  - id: check_match
    label: Route based on whether payment matched a job
    when:
      - matched_thread_id
    next: mark_paid

  - id: unmatched_payment
    label: Payment with no matching job thread — escalate to owner
    when:
      - matched_thread_id.is_none
    actions:
      - kind: escalate
        reason: "received Square payment {{payment_id}} (${{amount_cents | divided_by: 100}} {{currency}}) but could not match to an open job thread"
        to: owner_telegram_confirm
      - kind: log_audit
        event: unmatched_payment_escalated
        detail: "payment_id={{payment_id}}"

  - id: mark_paid
    label: Update job status to paid
    when:
      - matched_thread_id
    actions:
      - kind: mark_job_status
        status: paid
        thread_id: "{{matched_thread_id}}"
      - kind: set_state
        key: payment_confirmed
        value: "true"
      - kind: log_audit
        event: job_marked_paid
        detail: "thread={{matched_thread_id}} payment_id={{payment_id}}"
    next: trigger_review_ask

  - id: trigger_review_ask
    label: Schedule review ask for 1 hour post-payment
    when:
      - payment_confirmed
    actions:
      - kind: emit_bus_event
        event: job_complete
        payload:
          tenant_id: dhr
          thread_id: "{{matched_thread_id}}"
          payment_id: "{{payment_id}}"
      - kind: schedule_followup
        delay: PT1H
        action: send_review_request
        target_thread_id: "{{matched_thread_id}}"
      - kind: log_audit
        event: review_ask_scheduled
        detail: "thread={{matched_thread_id}} delay=PT1H"

outputs:
  - matched_thread_id
  - payment_confirmed
