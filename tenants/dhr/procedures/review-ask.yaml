schema_version: 1
procedure_id: review-ask
description: >
  After a DHR job is marked complete and payment confirmed, wait 1 hour then
  send a review request. Tries Google first, Facebook fallback. Channel
  preference: sms-textnow or the original FB Messenger thread.
  Voice: same DHR tone — lowercase, brief, no pressure.
owner_team: dhr
specialist_class: review-driver
trigger:
  kind: bus_event
  event: job_complete

inputs:
  required:
    - thread_id
  optional:
    - customer_name
    - channel_preference

runtime_budget:
  max_tokens_per_run: 500
  max_usd_per_run: 0.01
  max_runs_per_thread_per_day: 2

states:
  - id: wait_post_job
    label: Wait 1 hour after job completion before asking for review
    actions:
      - kind: wait_for_event
        event: review_ask_ready
        timeout: PT1H
    next: check_quiet_hours

  - id: check_quiet_hours
    label: Check if within DHR quiet hours (22:00-09:00 MDT) before sending
    actions:
      - kind: check_quiet_hours
        timezone: America/Edmonton
        quiet_start: "22:00"
        quiet_end: "09:00"
        store_as: is_quiet_hours
    next: send_review_request_or_defer

  - id: defer_until_morning
    label: Defer review ask until 09:00 MDT if currently in quiet hours
    when:
      - is_quiet_hours
    actions:
      - kind: schedule_followup
        delay_until: "09:00"
        delay_timezone: America/Edmonton
        action: send_review_request
        target_thread_id: "{{thread_id}}"
      - kind: log_audit
        event: review_ask_deferred
        detail: "thread={{thread_id}} reason=quiet_hours"
    next: closed

  - id: send_review_request
    label: Send review request via preferred channel
    when:
      - is_quiet_hours.is_false
    actions:
      - kind: send_review_request
        platforms:
          - google
          - facebook
        message_template: "hey {{customer_name | default: 'there'}}! hope the headlights are looking great. if you get a sec, would really appreciate a quick review: {{review_link}}"
        channel: "{{channel_preference | default: 'sms-textnow'}}"
        approval: auto
      - kind: mark_job_status
        status: review_requested
      - kind: log_audit
        event: review_request_sent
        detail: "thread={{thread_id}} channel={{channel_preference | default: 'sms-textnow'}}"
    next: closed

  - id: closed
    label: Review ask procedure complete
    actions:
      - kind: log_audit
        event: review_ask_procedure_complete
        detail: "thread={{thread_id}}"

outputs:
  - review_sent
