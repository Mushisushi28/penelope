schema_version: 1
procedure_id: follow-up
description: >
  Re-engage dormant DHR customers who were quoted or booked but went silent.
  Wires the FollowUpSpecialist with a 14-day cooldown and quiet-hours guard
  (22:00–09:00 America/Edmonton). Stages: quoted_no_booking, booked_no_show,
  paid_rebook. Approval required before send.
owner_team: dhr
specialist_class: follow-up
trigger:
  kind: schedule
  cron: "0 10 * * *"
  conditions:
    - "customer.last_contact_days >= 14"
    - "customer.job_status in [quoted, booked_no_show, paid]"
inputs:
  required:
    - thread_id
    - customer_name
    - job_status
    - last_contact_ts
  optional:
    - vehicle_info
    - quote_amount
runtime_budget:
  max_tokens_per_run: 1000
  max_usd_per_run: 0.05
  max_runs_per_thread_per_day: 1
brand_voice:
  tone: "lowercase, casual, brief — no pressure"
  forbidden_phrases:
    - "just following up"
    - "I wanted to check in"
    - "touching base"
    - "per my last message"
  emoji_policy: minimal

states:
  - id: check_cooldown
    label: Guard — enforce 14-day cooldown between follow-ups
    when:
      - "last_contact_days < 14"
    actions:
      - kind: log_audit
        event: followup_skipped_cooldown
        detail_template: "thread={{thread_id}} last_contact_days={{last_contact_days}}"

  - id: check_quiet_hours
    label: Guard — no outbound during quiet hours (22:00–09:00 MDT)
    when:
      - "last_contact_days >= 14"
    actions:
      - kind: wait_for_event
        event_type: quiet_hours_clear
        timeout: PT12H
        on_timeout: skip_this_run
    next: route_by_stage

  - id: route_by_stage
    label: Route to correct follow-up template based on job status
    when:
      - "last_contact_days >= 14"
    actions:
      - kind: set_state
        key: follow_up_stage
        value: "{{job_status}}"
    next: draft_message

  - id: draft_message
    label: Draft follow-up message for owner approval
    actions:
      - kind: send_message
        template: "hey {{customer_name | default: 'there'}} — still interested in getting those headlights sorted? we come to you anywhere in lethbridge."
        approval: owner_telegram_confirm
      - kind: mark_job_status
        status: qualifying
      - kind: log_audit
        event: followup_sent
        detail_template: "thread={{thread_id}} stage={{job_status}} days_silent={{last_contact_days}}"
    next: awaiting_reply

  - id: awaiting_reply
    label: Wait for customer reply — re-enter inquiry procedure on response
    actions:
      - kind: wait_for_event
        event_type: inbound_message
        timeout: P7D
        on_timeout: followup_no_response
      - kind: emit_bus_event
        event_type: customer_re_engaged
        payload_template:
          thread_id: "{{thread_id}}"
          stage: "{{job_status}}"
    next: closed

  - id: followup_no_response
    label: No reply after 7 days — log and close
    actions:
      - kind: log_audit
        event: followup_no_response
        detail_template: "thread={{thread_id}} stage={{job_status}}"
    next: closed

  - id: closed
    label: Follow-up procedure complete
    actions:
      - kind: log_audit
        event: followup_procedure_complete
        detail_template: "thread={{thread_id}}"

outputs:
  - follow_up_sent
  - customer_responded
