schema_version: 1
procedure_id: customer-inquiry-response
description: >
  Grandfather Formula — handle a new or in-progress customer inquiry for DHR
  headlight restoration. Qualifies the vehicle and condition across 2-3 turns,
  computes quote, offers Calendly booking, and confirms. One question per message.
  Voice: lowercase, 1-2 sentences, no formal openers, never ask two things at once.
owner_team: dhr
specialist_class: customer-frontend
trigger:
  kind: inbound_message
  channel: fb-page
inputs:
  required:
    - thread_id
    - inbound_message_text
    - inbound_message_ts
  optional:
    - customer_state_snapshot
    - customer_name
runtime_budget:
  max_tokens_per_run: 8000
  max_usd_per_run: 0.25
  max_runs_per_thread_per_day: 8
brand_voice:
  tone: "lowercase, conversational, 1-2 sentences"
  forbidden_phrases:
    - "I'd be happy to"
    - "Of course!"
    - "Absolutely!"
    - "Great question!"
    - "No problem!"
    - "Hello!"
    - "Hi there!"
  emoji_policy: match-customer

states:
  # Step: qualify_1 — first contact, ask vehicle type
  - id: qualify_1
    label: First contact — ask what vehicle they drive
    when:
      - customer_state.is_none
    actions:
      - kind: ask_question
        question: "hey! what kind of vehicle do you have?"
        store_as: vehicle_info
        approval: auto
      - kind: mark_job_status
        status: qualifying
      - kind: log_audit
        event: new_customer_contact
        detail_template: "first DM thread={{thread_id}}"
    next: qualify_2
    approval: auto

  # Step: qualify_2 — have vehicle, ask condition
  - id: qualify_2
    label: Have vehicle info, qualify condition
    when:
      - customer_state.vehicle_info
    actions:
      - kind: ask_question
        question: "are they pretty hazy or just starting to yellow?"
        store_as: condition
        approval: auto
    next: qualify_3
    approval: auto

  # Step: qualify_3 — optional ceramic upsell qualifier
  - id: qualify_3
    label: Optional — offer ceramic upgrade if customer seems quality-focused
    when:
      - customer_state.condition
      - customer_state.intent_ceramic.is_none
    actions:
      - kind: ask_question
        question: "want the ceramic coat that lasts 3x longer, or standard is fine?"
        store_as: pricing_decision
        optional: true
        approval: auto
    next: quote

  # Step: quote — compute and send quote
  - id: quote
    label: Compute and send quote based on vehicle and condition
    when:
      - customer_state.vehicle_info
      - customer_state.condition
    actions:
      - kind: compute_quote
        pricing_rule_id: standard
        store_as: quote_amount
        out_of_band_approval: owner_telegram_confirm
      - kind: send_message
        template: "for your {{vehicle_info}} with {{condition}} lights you're looking at ${{quote_amount}} for the pair — standard finish, 1-year warranty, we come to you in lethbridge."
        approval: auto
      - kind: mark_job_status
        status: quoted
      - kind: log_audit
        event: quote_sent
        detail_template: "quote={{quote_amount}} vehicle={{vehicle_info}} condition={{condition}}"
    next: close

  # Step: close — offer booking link
  - id: close
    label: Offer Calendly booking link
    when:
      - customer_state.quote_amount
    actions:
      - kind: ask_question
        question: "want to lock in a time?"
        store_as: intent_to_book
        approval: auto
      - kind: offer_booking_link
        provider: calendly
        message_template: "here's the link: https://calendly.com/dobsonheadlights/headlight-restoration-appointment — fridays and saturdays work best"
        channel: fb-page
        approval: auto
      - kind: mark_job_status
        status: booked
      - kind: log_audit
        event: booking_link_sent
    next: confirm

  # Step: confirm — booking confirmation
  - id: confirm
    label: Confirm appointment details and set reminder
    when:
      - customer_state.intent_to_book
    actions:
      - kind: send_message
        template: "awesome — just to confirm: {{vehicle_info}}, your place, {{appointment_time | default: 'the slot you picked'}}. i'll reach out the day before."
        approval: auto
      - kind: schedule_followup
        delay: P1D
        invoke_procedure: appointment-reminder
        inputs:
          thread_id: "{{thread_id}}"
          vehicle_info: "{{vehicle_info}}"
      - kind: log_audit
        event: booking_confirmed
        detail_template: "thread={{thread_id}} vehicle={{vehicle_info}}"

  # Price objection — escalate to owner
  - id: price_objection
    label: Customer objects to price — escalate
    when:
      - customer_state.price_objection
    actions:
      - kind: escalate
        to: owner_telegram_confirm
        reason: "customer objecting to quoted price"
        include_context: true
      - kind: log_audit
        event: price_objection_escalated
        detail_template: "thread={{thread_id}}"

  # Ceramic inquiry — compute ceramic quote
  - id: ceramic_inquiry
    label: Customer asked about ceramic option
    when:
      - customer_state.pricing_decision
    actions:
      - kind: compute_quote
        pricing_rule_id: ceramic
        store_as: ceramic_quote_amount
        out_of_band_approval: owner_telegram_confirm
      - kind: send_message
        template: "ceramic runs ${{ceramic_quote_amount}} — 3-year warranty vs 1-year standard. still done at your place."
        approval: auto
    next: close

  # Out of scope
  - id: out_of_scope
    label: Request outside DHR scope
    actions:
      - kind: send_message
        template: "we do restoration and polishing — if the lens is just hazy we can make it look new. full replacements we don't do."
        approval: auto

outputs:
  - quote_amount
  - vehicle_info
  - condition
  - pricing_decision
  - booking_confirmed
