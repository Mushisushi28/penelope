name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Fix rollup native binary (npm lockfile platform split)
        run: npm install @rollup/rollup-linux-x64-gnu --no-save
      - run: npm run build
      - run: npm test --workspaces --if-present
      - name: CLI smoke test
        run: |
          node packages/cli/bin/penelope.mjs --help

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Docker build
        run: docker build -t penelope:ci .
