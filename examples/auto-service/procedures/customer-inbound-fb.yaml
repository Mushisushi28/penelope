schema_version: 1
procedure_id: customer-inbound-fb
description: Handle incoming Facebook Messenger DMs for an auto headlight restoration business. Qualify vehicle, compute quote, offer booking, hand off to owner on escalation.
owner_team: auto-service
specialist_class: customer-frontend
trigger:
  kind: inbound_message
  channel: fb-page
inputs:
  required:
    - thread_id
    - inbound_message_text
    - inbound_message_ts
  optional:
    - customer_state_snapshot
    - customer_name
runtime_budget:
  max_tokens_per_run: 8000
  max_usd_per_run: 0.25
  max_runs_per_thread_per_day: 8
brand_voice:
  tone: lowercase, conversational, 1-2 sentences
  forbidden_phrases:
    - "I'd be happy to"
    - "Of course!"
    - "Absolutely!"
    - "Great question!"
    - "No problem!"
  emoji_policy: match-customer
states:
  - id: new_inbound
    label: First contact — unknown customer
    when:
      - customer_state.is_none
    actions:
      - kind: ask_question
        question: "hey! what kind of vehicle do you have and how are the headlights looking?"
        store_as: vehicle_info
        approval: auto
      - kind: mark_job_status
        status: qualifying
      - kind: log_audit
        event: new_customer_contact
        detail: "first DM from customer"
    next: awaiting_vehicle_info
    approval: auto

  - id: returning_customer
    label: Returning customer — already have vehicle info
    when:
      - customer_state.vehicle_info
      - customer_state.job_status.is_none
    actions:
      - kind: send_message
        template: "hey, welcome back! ready to book another restoration for your {{customer_state.vehicle_info}}?"
        approval: auto
    next: awaiting_vehicle_info
    approval: auto

  - id: awaiting_vehicle_info
    label: Waiting for vehicle details before quoting
    when:
      - customer_state.vehicle_info
      - customer_state.quote_amount.is_none
    actions:
      - kind: compute_quote
        pricing_rule_id: regular
        store_as: quote_amount
        out_of_band_approval: owner_telegram_confirm
      - kind: send_message
        template: "for a standard restoration on your {{vehicle_info}}, you're looking at around ${{quote_amount}} CAD — done mobile at your location, usually takes about 45 min"
        approval: auto
      - kind: ask_question
        question: "want to lock in a time? i can send a booking link"
        store_as: intent_to_book
        approval: auto
      - kind: mark_job_status
        status: quoted
      - kind: log_audit
        event: quote_sent
        detail: "quote_amount={{quote_amount}}"
    next: quoted_pending_booking

  - id: ceramic_upsell
    label: Customer asked about ceramic / premium option
    when:
      - customer_state.intent_ceramic
    actions:
      - kind: compute_quote
        pricing_rule_id: ceramic
        store_as: ceramic_quote_amount
        out_of_band_approval: owner_telegram_confirm
      - kind: send_message
        template: "the ceramic coat version runs ${{ceramic_quote_amount}} — lasts 2-3x longer than standard, still done at your location"
        approval: auto
      - kind: ask_question
        question: "want to go with the ceramic, or stick with the standard?"
        store_as: pricing_decision
        approval: auto
      - kind: mark_job_status
        status: quoted
    next: quoted_pending_booking

  - id: quoted_pending_booking
    label: Quote sent, waiting for customer to confirm booking
    when:
      - customer_state.intent_to_book
    actions:
      - kind: offer_booking_link
        provider: calendly
        message_template: "awesome, here's the link to grab a time: {{calendly_link}}"
        approval: auto
      - kind: mark_job_status
        status: booked
      - kind: log_audit
        event: booking_link_sent
    next: booked

  - id: booked
    label: Booking confirmed — post-job tracking
    when:
      - customer_state.job_status.is_booked
    actions:
      - kind: send_message
        template: "you're locked in — see you then! anything else you need before the appointment?"
        approval: auto
      - kind: schedule_followup
        delay: P1D
        action: check_appointment_reminder
    next: post_job

  - id: price_objection
    label: Customer objects to price
    when:
      - customer_state.price_objection
    actions:
      - kind: escalate
        reason: "customer objecting to quoted price — owner review needed"
        to: owner_telegram_confirm
      - kind: log_audit
        event: price_objection_escalated

  - id: post_job
    label: Job done — trigger review ask
    when:
      - customer_state.job_status.is_complete
    actions:
      - kind: emit_bus_event
        event: job_complete
        payload:
          tenant_id: auto-service
          thread_id: "{{thread_id}}"
          vehicle_info: "{{customer_state.vehicle_info}}"
      - kind: log_audit
        event: job_complete
    next: closed

  - id: closed
    label: Thread closed
    when:
      - customer_state.job_status.is_closed
    actions:
      - kind: log_audit
        event: thread_closed

outputs:
  - quote_amount
  - booking_confirmed
  - vehicle_info
