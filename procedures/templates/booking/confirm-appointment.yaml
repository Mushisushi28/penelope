name: confirm-appointment
description: Query availability and create a booking on Cal.com.
connector: cal-com
steps:
  - capability: availability.query
    args:
      event_type_id: "{{ tenant.config.default_event_type_id }}"
      start_time: "{{ requested_start }}"
      end_time: "{{ requested_end }}"

  - capability: booking.create
    args:
      event_type_id: "{{ tenant.config.default_event_type_id }}"
      start: "{{ steps[0].first_available_slot }}"
      attendee_name: "{{ customer.name }}"
      attendee_email: "{{ customer.email }}"
    consent_required: true

outputs:
  - booking_id
  - booking_url
  - booking_start_time
