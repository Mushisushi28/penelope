name: respond-to-reviews
description: Fetch recent reviews and post AI-drafted responses via BrightLocal.
connector: brightlocal
steps:
  - capability: review.list
    args:
      location_id: "{{ tenant.config.location_id }}"
      status: "unanswered"
      sources: "{{ tenant.config.review_sources }}"

  - capability: review.respond
    args:
      review_id: "{{ review.id }}"
      response_text: "{{ ai_drafted_response }}"
    consent_required: true

outputs:
  - responded_review_ids
