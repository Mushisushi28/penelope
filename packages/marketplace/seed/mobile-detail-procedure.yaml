# Mobile Detailing — Lead Response Procedure
# Version: 1.0.0 | Vertical: Automotive Detailing

metadata:
  id: mobile-detail-v1
  name: Mobile Detail — Lead Response
  vertical: detailing
  version: "1.0.0"
  avg_turns: 6

steps:
  - id: greet
    role: agent
    template: |
      Hey {customer_first_name}! Thanks for reaching out to {business_name}.
      What kind of vehicle do you have? (Year/Make/Model is helpful.)

  - id: capture_vehicle
    role: customer
    extract:
      - field: vehicle_year
      - field: vehicle_make
      - field: vehicle_model
      - field: vehicle_condition
        optional: true

  - id: capture_service
    role: agent
    template: |
      Nice! What service are you looking for?
      - Exterior wash & clay bar
      - Interior deep clean
      - Full detail (interior + exterior + polish)
      - Paint correction

  - id: extract_service
    role: customer
    extract:
      - field: service_requested

  - id: capture_location
    role: agent
    template: |
      Perfect. We come to you — what's your address or general area?

  - id: extract_location
    role: customer
    extract:
      - field: customer_address

  - id: quote
    role: agent
    template: |
      Here's a quick estimate for a {service_requested} on your {vehicle_year}
      {vehicle_make} {vehicle_model}: {quote_line}
      Want to lock in a time?

  - id: book_or_followup
    role: agent
    branch:
      if: "wants_booking == 'yes'"
      then:
        template: "Awesome! What days/times work best for you this week?"
      else:
        template: "No worries — I'll follow up in a day or two. Have a great one!"

pricing_guide:
  exterior_wash: "$80-$120"
  interior_deep_clean: "$100-$150"
  full_detail: "$200-$350"
  paint_correction: "$400-$800"
