# Barbershop — Appointment Booking Procedure
# Version: 1.0.0
# Vertical: Barbershop

metadata:
  id: barbershop-booking-v1
  name: Barbershop — Appointment Booking
  vertical: barbershop
  version: "1.0.0"
  avg_turns: 5

steps:
  - id: greet
    role: agent
    template: |
      Hey {customer_first_name}! Welcome to {business_name}. Looking to book
      a cut? What can we do for you today?

  - id: capture_service
    role: customer
    extract:
      - field: service_type
        hint: "haircut, beard trim, hot shave, combo, kids cut"

  - id: barber_preference
    role: agent
    template: |
      Nice choice. Do you have a preferred barber, or are you happy with
      whoever's available?
      {barber_list}

  - id: extract_barber
    role: customer
    extract:
      - field: preferred_barber
        optional: true

  - id: slot_offer
    role: agent
    template: |
      Here are the next available slots:
      {available_slots}
      Which one works for you?

  - id: confirm_slot
    role: customer
    extract:
      - field: chosen_slot

  - id: capture_contact
    role: agent
    template: |
      Got it — {chosen_slot} it is. What's the best number to confirm
      the appointment? (We'll send a reminder the morning of.)

  - id: extract_contact
    role: customer
    extract:
      - field: contact_phone

  - id: confirm
    role: agent
    template: |
      You're all set! {chosen_slot} with {preferred_barber | "us"}.
      We'll text {contact_phone} a reminder the morning of. See you then!

cancellation_policy:
  notice_hours: 2
  message: "Please give us at least 2 hours' notice to cancel or reschedule."

pricing_guide:
  haircut: "$30–$45"
  beard_trim: "$15–$20"
  hot_shave: "$35"
  combo: "$50–$65"
  kids_cut: "$20–$25"
