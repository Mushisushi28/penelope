<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Penelope</title>
  <meta name="theme-color" content="#1a1e14" />
  <meta name="color-scheme" content="dark light" />

  <!-- Flash-prevention: read saved theme from localStorage and apply CSS vars
       before first paint. Odysseus pattern 1. -->
  <script>
  (function () {
    try {
      var t = JSON.parse(localStorage.getItem('penelope-theme'));
      var s = document.documentElement.style;
      var r = document.documentElement;
      if (t && t.colors) {
        for (var k in t.colors) {
          if (k.indexOf('--') === 0) s.setProperty(k, t.colors[k]);
        }
      }
      if (t && t.dark === false) {
        r.setAttribute('data-theme', 'light');
      } else {
        r.setAttribute('data-theme', 'dark');
      }
      if (t && t.density && t.density !== 'comfortable') {
        r.classList.add('density-' + t.density);
      }
      // Favicon recolor (Odysseus pattern 5)
      var ac = (t && t.colors && t.colors['--penelope-shuttle']) || '#b87333';
      var bg = (t && t.colors && t.colors['--penelope-loom']) || '#1a1e14';
      var svg = "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'>" +
        "<rect width='32' height='32' rx='6' fill='" + bg + "'/>" +
        "<line x1='6' y1='10' x2='26' y2='10' stroke='" + ac + "' stroke-width='2.5' stroke-linecap='round'/>" +
        "<line x1='6' y1='16' x2='20' y2='16' stroke='" + ac + "' stroke-width='2.5' stroke-linecap='round'/>" +
        "<line x1='6' y1='22' x2='24' y2='22' stroke='" + ac + "' stroke-width='2.5' stroke-linecap='round'/>" +
        "</svg>";
      var link = document.createElement('link');
      link.rel = 'icon'; link.type = 'image/svg+xml';
      link.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
      document.head.appendChild(link);
      var mtc = document.querySelector('meta[name="theme-color"]');
      if (mtc) mtc.setAttribute('content', bg);
    } catch (_) {}
  })();
  </script>

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="modulepreload" href="/js/app.js">
  <link rel="modulepreload" href="/js/router.js">
  <link rel="modulepreload" href="/js/theme.js">
  <link rel="modulepreload" href="/js/api.js">
  <link rel="modulepreload" href="/js/panels/home.js">
  <link rel="modulepreload" href="/js/panels/inbox.js">
  <link rel="modulepreload" href="/js/inbox/channel-icon.js">
  <link rel="modulepreload" href="/js/inbox/thread-list.js">
  <link rel="modulepreload" href="/js/inbox/thread-detail.js">
  <link rel="modulepreload" href="/js/inbox/composer.js">
  <link rel="modulepreload" href="/js/inbox/takeover-toggle.js">
  <link rel="modulepreload" href="/js/panels/shadow-queue.js">
  <link rel="modulepreload" href="/js/panels/settings.js">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/inbox.css">
  <link rel="stylesheet" href="/css/procedure-editor.css">
  <!-- procedures-editor.js is lazy-loaded by router.js on /procedures/:id/edit;
       no modulepreload here intentionally (keep shell bundle small). -->
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <div class="brand">
        <span class="brand-mark"></span>
        <span class="brand-name" id="brand-tenant">Penelope</span>
        <span class="brand-sub">dashboard</span>
      </div>
      <div class="top-spacer"></div>
      <span class="health-dot" id="health-dot" title="server status"></span>
      <button class="top-action" id="theme-toggle" title="Toggle dark / light">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v1.5M8 13.5V15M15 8h-1.5M2.5 8H1M12.364 3.636l-1.06 1.06M4.696 11.304l-1.06 1.06M12.364 12.364l-1.06-1.06M4.696 4.696l-1.06-1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section-label">Panels</div>
      <nav id="nav-list"></nav>
    </aside>

    <main class="main">
      <div id="view-root"></div>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
