<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" width="64" height="64" aria-label="Penelope logo mark">
  <!--
    Penelope logo mark — a loom shuttle threaded through a chat bubble.
    Monoline, single color (#2D4A3E deep olive), scales to 24px favicon.
    currentColor-compatible for theme switching.
  -->

  <!-- Chat bubble / Ithaca dome — the home she protects -->
  <path
    d="M8 10 C8 6.686 10.686 4 14 4 L50 4 C53.314 4 56 6.686 56 10 L56 38 C56 41.314 53.314 44 50 44 L34 44 L26 56 L26 44 L14 44 C10.686 44 8 41.314 8 38 Z"
    stroke="#2D4A3E"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Weaving warp threads — three vertical lines -->
  <line x1="22" y1="14" x2="22" y2="34" stroke="#2D4A3E" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="32" y1="11" x2="32" y2="37" stroke="#2D4A3E" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="42" y1="14" x2="42" y2="34" stroke="#2D4A3E" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- Shuttle thread — the weft, the undoing, the weave — sinusoidal across warp -->
  <path
    d="M16 18 C18 14 20 14 22 18 C24 22 26 22 28 18 C30 14 32 14 34 18 C36 22 38 22 40 18 C42 14 44 14 46 18 C48 22 50 22 50 20"
    stroke="#2D4A3E"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Second pass — Penelope undoes her work each night -->
  <path
    d="M16 26 C18 30 20 30 22 26 C24 22 26 22 28 26 C30 30 32 30 34 26 C36 22 38 22 40 26 C42 30 44 30 46 26 C48 22 50 22 50 24"
    stroke="#2D4A3E"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Shuttle body — pointed at both ends, centered on second thread pass -->
  <ellipse cx="32" cy="32" rx="8" ry="3" stroke="#2D4A3E" stroke-width="2" fill="none"/>
  <line x1="32" y1="29" x2="32" y2="35" stroke="#2D4A3E" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
