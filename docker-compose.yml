version: "3.9"

# Penelope — docker compose stack
# Minimal: penelope-core + penelope-dashboard
# Optional services are commented out. Uncomment as needed.

services:

  # ── Core process ─────────────────────────────────────────────────────────
  # Runs the owner-agent, customer-agent, watchers, and bus for every tenant.
  # One container, all tenants. Scale by running multiple instances with
  # different PENELOPE_TENANT_SLUG values (future roadmap).
  penelope-core:
    image: ghcr.io/mushisushi28/penelope:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: penelope-core
    restart: unless-stopped
    env_file: .env
    environment:
      PENELOPE_DATA_DIR: /data
      NODE_ENV: production
    volumes:
      - penelope-data:/data
      # Bind-mount your tenants directory so configs survive container rebuilds
      - ./tenants:/data/tenants:ro
    networks:
      - penelope-internal
    command: ["up"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:18900/health', r => process.exit(r.statusCode===200?0:1))\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Dashboard (read-only owner web UI) ───────────────────────────────────
  # Serves the per-tenant Odysseus-themed dashboard.
  # Reads bus.sqlite per tenant from the shared /data volume.
  penelope-dashboard:
    image: ghcr.io/mushisushi28/penelope:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: penelope-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      PENELOPE_DATA_DIR: /data
      PENELOPE_DASHBOARD_PORT: "18900"
      NODE_ENV: production
    volumes:
      - penelope-data:/data:ro
    ports:
      - "${PENELOPE_DASHBOARD_PORT:-18900}:18900"
    networks:
      - penelope-internal
      - penelope-external
    command: ["node", "packages/dashboard/serve.mjs"]
    depends_on:
      penelope-core:
        condition: service_healthy

  # ── Optional: nginx TLS reverse proxy ────────────────────────────────────
  # Uncomment if you have a domain and want HTTPS via Let's Encrypt.
  # Requires: PENELOPE_DOMAIN set in .env, ports 80+443 open on host.
  #
  # nginx-tls:
  #   image: jonasal/nginx-certbot:latest
  #   container_name: penelope-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     CERTBOT_EMAIL: ${OWNER_EMAIL}
  #     STAGING: "0"
  #   volumes:
  #     - ./infra/nginx.conf:/etc/nginx/user_conf.d/penelope.conf:ro
  #     - nginx-certs:/etc/letsencrypt
  #   networks:
  #     - penelope-external
  #   depends_on:
  #     - penelope-dashboard

  # ── Optional: local Postgres (instead of Neon) ───────────────────────────
  # Uncomment if you prefer a local Postgres over Neon cloud.
  # Set DATABASE_URL=postgresql://penelope:secret@postgres:5432/penelope in .env.
  #
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: penelope-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: penelope
  #     POSTGRES_USER: penelope
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - penelope-internal
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U penelope"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  penelope-data:
    driver: local
  # nginx-certs:
  #   driver: local
  # postgres-data:
  #   driver: local

networks:
  penelope-internal:
    driver: bridge
    internal: true
  penelope-external:
    driver: bridge
